# CI: companion apps (pnpm + Rust). Firmware (QMK / Pico SDK) is built locally — see README.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Repo layout (catches stale docs / accidental path renames) ─────────────
  repo-layout:
    name: Repository layout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify domains/ tree
        run: |
          test -d domains/glyf/display/firmware
          test -d domains/rnd/macropads/macro-eleven/firmware
          test -d domains/rnd/macropads/four-pad/firmware
          test -f domains/glyf/display/build.sh
          test -f domains/rnd/macropads/macro-eleven/build.sh
          test -f domains/rnd/macropads/four-pad/build.sh

  # ── TypeScript ───────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [glyf, macro-eleven]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck ${{ matrix.app }}
        run: pnpm --filter ${{ matrix.app }} typecheck

  # ── Rust ─────────────────────────────────────────────────────────────────────
  rust:
    name: Rust
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libudev-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check workspace
        run: cargo check --workspace --locked
