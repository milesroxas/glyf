# CI: companion apps (pnpm + Rust). Firmware (QMK / Pico SDK) is built locally — see README.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs for the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Repo layout (catches stale docs / accidental path renames) ─────────────
  repo-layout:
    name: Repository layout
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Verify domains/ tree
        run: |
          test -d domains/glyf/display/firmware
          test -d domains/prototypes/macropads/macro-eleven/firmware
          test -d domains/prototypes/macropads/four-pad/firmware
          test -f domains/glyf/display/build.sh
          test -f domains/prototypes/macropads/macro-eleven/build.sh
          test -f domains/prototypes/macropads/four-pad/build.sh

  # ── TypeScript + Vitest (single install: all workspace packages) ───────────
  typescript:
    name: TypeScript & Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # Version comes from root package.json "packageManager" (Corepack field).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Install Playwright Chromium (Vitest browser mode)
        run: pnpm exec playwright install chromium --with-deps

      - name: Run Vitest workspace
        run: pnpm test

  # ── Rust (Tauri crates: compile + unit tests) ──────────────────────────────
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Matches https://v2.tauri.app/start/prerequisites/ (Debian/Ubuntu) + HID (libudev).
      # Use libayatana-appindicator3-dev — libappindicator3-dev is deprecated on Ubuntu 24+.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libudev-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test workspace
        run: cargo test --workspace --locked
